<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANA PREMIUM ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #050505; font-family: 'Montserrat', sans-serif; color: #ccc; overflow: hidden; }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            width: 350px; padding: 40px; background: #0a0a0a; border: 1px solid #1a1a1a;
            border-radius: 10px; text-align: center; box-shadow: 0 0 20px rgba(0, 150, 255, 0.1);
        }
        .login-box h2 { color: #0096ff; margin-bottom: 25px; letter-spacing: 5px; font-size: 20px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #000;
            border: 1px solid #222; color: #0096ff; border-radius: 5px; outline: none; text-align: center;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #0096ff; color: #fff;
            border: none; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase;
        }

        /* --- SIDEBAR --- */
        #dashboard { display: none; width: 100vw; height: 100vh; }
        .sidebar { width: 260px; height: 100%; background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 25px; text-align: center; border-bottom: 1px solid #111; }
        .sidebar-brand h1 { color: #fff; font-size: 18px; letter-spacing: 4px; font-weight: 700; }

        .menu-item {
            padding: 15px 25px; color: #666; cursor: pointer;
            border-left: 3px solid transparent; transition: 0.3s; font-size: 13px; font-weight: 600; text-transform: uppercase;
        }
        .menu-item:hover, .menu-item.active { background: #0f0f0f; color: #0096ff; border-left: 3px solid #0096ff; }

        /* --- MAIN PANEL --- */
        .main-panel { flex: 1; background: #050505; display: flex; flex-direction: column; }
        .header { height: 60px; background: #080808; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 1px solid #111; }
        .content-body { flex: 1; padding: 25px; overflow-y: auto; }

        /* --- KOTAK PREDIKSI DARK NEON --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .card { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            border-radius: 8px; 
            padding: 20px; 
            transition: 0.3s;
            position: relative;
        }
        /* Efek Lampu Neon Garis Tajam */
        .card:hover { 
            border-color: #0096ff; 
            box-shadow: 0 0 15px rgba(0, 150, 255, 0.3);
            transform: translateY(-3px);
        }

        .card h3 { 
            color: #fff; font-size: 14px; margin-bottom: 15px; 
            border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; 
            letter-spacing: 1px; text-align: left;
        }
        
        .prediksi-text {
            background: #000; 
            color: #aaa; /* Warna Abu-abu Platinum agar tidak silau */
            padding: 15px; border-radius: 5px;
            font-family: 'Share Tech Mono', monospace; font-size: 14px;
            line-height: 1.6; border: 1px solid #111; white-space: pre-wrap;
        }

        /* Warna khusus untuk label di dalam teks */
        .prediksi-text span { color: #0096ff; font-weight: bold; }

        .btn-copy {
            width: 100%; margin-top: 15px; padding: 12px; 
            background: transparent; color: #444; border: 1px solid #222; 
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-copy:hover { border-color: #0096ff; color: #0096ff; background: rgba(0, 150, 255, 0.05); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>GANA ADMIN</h2>
            <input type="text" id="user" placeholder="USER ID">
            <input type="password" id="pass" placeholder="PASSWORD">
            <button onclick="doLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <div class="sidebar-brand"><h1>GANA PANEL</h1></div>
            <div class="menu-item active" onclick="loadPage('home', this)">Dashboard</div>
            <div class="menu-item" onclick="loadPage('togel', this)">Prediksi Togel</div>
            <div class="menu-item" onclick="loadPage('bank', this)">Jadwal Bank</div>
            <div class="menu-item" onclick="loadPage('sgp', this)">SGP Toto Calc</div>
            <div class="menu-item" onclick="location.reload()" style="color: #444; margin-top: auto;">Logout</div>
        </div>

        <div class="main-panel">
            <div class="header">
                <div id="current-menu" style="color: #0096ff; font-weight: bold; font-size: 12px; letter-spacing: 2px;">DASHBOARD</div>
                <div id="clock" style="color: #444; font-size: 12px;"></div>
            </div>
            <div class="content-body" id="main-view"></div>
        </div>
    </div>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('id-ID'); }, 1000);
        
        function doLogin() {
            if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "gana77") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                loadPage('home');
            } else { alert("Access Denied"); }
        }

        const daftarPasaran = [
            "HOKI DRAW", "TOTO MACAU PAGI", "KENTUCKY MIDDAY", "FLORIDA MIDDAY", "HUAHIN 0100", 
            "BANGKOK 0130", "NEWYORK MIDDAY", "CAROLINA DAY", "BRUNEI 02", "OREGON 03", 
            "OREGON 06", "CALIFORNIA", "FLORIDA EVENING", "OREGON 09", "BANGKOK 0930", 
            "NEWYORK EVENING", "KENTUCKY EVENING", "CAROLINA EVENING", "TOTOCAMBODIA", 
            "CHELSEA 11", "OREGON 12", "POIPET12", "BULLSEYE", "TOTOMACAU SIANG", 
            "SYDNEY", "JAKARTA 1400", "BRUNEI 14", "CHELSEA 15", "TOTOMALI 1530", 
            "TOTOMACAU 5D SORE", "POIPET15", "TOTOMACAU SORE", "HUAHIN 1630", 
            "KING KONG 4D I", "SINGAPORE", "MAGNUM4D", "TOTOMACAU MALAM I", 
            "CHELSEA 19", "POIPET19", "PCSO", "TOTOMALI 2030", "HUAHIN 2100", 
            "CHELSEA 21", "TOTOMACAU 5D MALAM", "NEVADA", "BRUNEI 21", 
            "TOTOMACAU MALAM II", "POIPET22", "HONGKONG", "TOTOMACAU MALAM III", 
            "TOTOMALI 2330", "JAKARTA 2330", "KING KONG 4D II"
        ];

        function loadPage(page, element) {
            const view = document.getElementById('main-view');
            const title = document.getElementById('current-menu');
            if(element) {
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                element.classList.add('active');
            }

            if(page === 'home') {
                title.innerText = "DASHBOARD";
                view.innerHTML = `<div style="border: 1px solid #1a1a1a; padding: 40px; border-radius: 10px; text-align:center;"><h2 style="color: #fff;">System Operational</h2><p style="color: #444; margin-top: 10px;">Gana Premium Admin is now online.</p></div>`;
            } else if(page === 'togel') {
                title.innerText = "PREDIKSI TOGEL";
                let html = '<div class="grid">';
                daftarPasaran.forEach((p, i) => {
                    let txt = `PASARAN: ${p}\nDATE: 08 APRIL 2026\n\nBBFS: 9021573\nAM: 26709\n4D: 1610 6637 7253 8175\n2D: 67 64 51 37 06 22\nCB: 3 / 2\nSHIO: AYAM / MONYET`;
                    html += `<div class="card"><h3>${p}</h3><pre class="prediksi-text" id="p-${i}">${txt}</pre><button class="btn-copy" onclick="cp('p-${i}')">COPY DATA</button></div>`;
                });
                view.innerHTML = html + '</div>';
            } else if(page === 'bank') {
                title.innerText = "JADWAL BANK";
                view.innerHTML = `<div class="card"><h3>BANK STATUS</h3><p style="color: #0096ff; font-size:12px;">ALL SYSTEMS ONLINE</p></div>`;
            } else if(page === 'sgp') {
                title.innerText = "SGP TOTO CALC";
                view.innerHTML = `<div class="card"><h3>CALCULATOR</h3><p style="color: #444;">Calculating module ready.</p></div>`;
            }
        }
        function cp(id) { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("Copied to clipboard"); }
    </script>
</body>
</html>
