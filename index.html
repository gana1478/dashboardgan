<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANA ADMIN PANEL</title>
    <style>
        /* RESET TOTAL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* --- HALAMAN LOGIN (DI TENGAH PRESISI) --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0f0f0f 0%, #000000 100%);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            width: 350px; padding: 40px; background: #0a0a0a; border: 1px solid gold;
            border-radius: 15px; text-align: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
        }
        .login-box h2 { color: gold; margin-bottom: 20px; letter-spacing: 2px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a1a;
            border: 1px solid #333; color: #fff; border-radius: 5px; outline: none;
        }
        .login-box button {
            width: 100%; padding: 12px; background: gold; color: #000;
            border: none; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s;
        }
        .login-box button:hover { background: #ffcc00; transform: scale(1.02); }

        /* --- DASHBOARD UTAMA --- */
        #dashboard { display: none; width: 100vw; height: 100vh; }

        /* SIDEBAR (BACKGROUND LUAR) */
        .sidebar {
            width: 260px; height: 100%; background: #080808; /* HITAM PEKAT */
            border-right: 1px solid #1a1a1a; display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .sidebar-header h1 { color: gold; font-size: 20px; }

        .menu-list { flex: 1; overflow-y: auto; }
        .menu-list a {
            display: block; padding: 15px 25px; color: #888; text-decoration: none;
            border-bottom: 1px solid #111; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .menu-list a:hover { background: #111; color: gold; border-left: 4px solid gold; }
        .menu-list a.active { background: #111; color: gold; font-weight: bold; border-left: 4px solid gold; }

        /* KONTEN (BACKGROUND DALAM - BEDA WARNA) */
        .main-content {
            flex: 1; height: 100%; background: #0f0f12; /* HITAM KEABUAN (BEDA!) */
            display: flex; flex-direction: column;
        }
        .top-bar {
            height: 70px; background: #0a0a0a; display: flex; align-items: center;
            justify-content: space-between; padding: 0 30px; border-bottom: 1px solid gold;
        }
        .view-area { flex: 1; padding: 30px; overflow-y: auto; }

        /* KARTU PREDIKSI */
        .grid-togel { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #161618; border: 1px solid #222; border-radius: 10px; padding: 20px; }
        .card h3 { color: gold; margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        pre { background: #000; color: #0f0; padding: 15px; border-radius: 5px; font-size: 13px; line-height: 1.5; border: 1px solid #222; }
        .btn-copy {
            width: 100%; margin-top: 15px; padding: 10px; background: #00d2ff;
            color: #000; border: none; font-weight: bold; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>GANA ADMIN</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="checkLogin()">MASUK DASHBOARD</button>
        </div>
    </div>

    <div id="dashboard" style="display: flex;">
        <div class="sidebar">
            <div class="sidebar-header"><h1>GANA PANEL</h1></div>
            <div class="menu-list">
                <a class="active" onclick="showPage('prediksi')">📊 PREDIKSI TOGEL</a>
                <a onclick="showPage('sgp')">🧮 PERHITUNGAN SGPTOTO</a>
                <a onclick="showPage('bank')">💳 JADWAL BANK</a>
                <a onclick="location.reload()" style="color: #ff4444; margin-top: 50px;">🔒 LOGOUT</a>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div id="page-title" style="color: gold; font-weight: bold;">PREDIKSI TOGEL</div>
                <div style="color: #666; font-size: 12px;">Server Aktif: 08 April 2026</div>
            </div>
            <div class="view-area" id="content-area">
                </div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "gana77") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                showPage('prediksi');
            } else { alert("Akses Ditolak!"); }
        }

        const pasaran = ["HOKI DRAW", "TOTO MACAU", "KENTUCKY MID", "FLORIDA MID", "HUAHIN 0100", "BANGKOK 0130", "NEWYORK MID", "CAROLINA DAY"];

        function showPage(page) {
            const area = document.getElementById('content-area');
            const title = document.getElementById('page-title');
            let html = "";

            if(page === 'prediksi') {
                title.innerText = "PREDIKSI TOGEL";
                html = '<div class="grid-togel">';
                pasaran.forEach((p, i) => {
                    let r = (l) => Math.floor(Math.random() * Math.pow(10, l)).toString().padStart(l, '0');
                    let code = `PREDIKSI ${p}\nBBFS: ${r(7)}\nAM: ${r(5)}\n4D: ${r(4)}\nSHIO: KUDA / ANJING`;
                    html += `<div class="card"><h3>${p}</h3><pre id="t-${i}">${code}</pre><button class="btn-copy" onclick="copy('t-${i}')">COPY DATA</button></div>`;
                });
                html += '</div>';
            } else if(page === 'sgp') {
                title.innerText = "PERHITUNGAN SGPTOTO";
                html = '<h2 style="color:white; text-align:center; margin-top:100px;">Module Maintenance</h2>';
            } else if(page === 'bank') {
                title.innerText = "JADWAL BANK";
                html = '<div class="grid-togel">';
                ["BCA", "BNI", "BRI", "MANDIRI"].forEach(b => {
                    html += `<div class="card" style="border-left: 4px solid gold;"><h3>${b}</h3><p style="color:#0f0;">ONLINE</p></div>`;
                });
                html += '</div>';
            }
            area.innerHTML = html;
        }

        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("Berhasil dicopy!");
        }
    </script>
</body>
</html>
